<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/evil-emma-favicon.svg">
  <title>Chat Evil Emma</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #dd0000;
      --red-hot: #ff2222;
      --red-dim: #aa2200;
      --red-glow: rgba(220, 0, 0, 0.75);
      --red-faint: rgba(220, 0, 0, 0.12);
      --black: #000000;
      --dark: #080808;
      --dark2: #0f0f0f;
      --dark3: #161616;
      --border: #2a2a2a;
      --border2: #3a3a3a;
      --text: #f0f0f0;
      --text2: #cccccc;
      --text3: #888888;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Rajdhani', sans-serif;
      --radius: 4px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--black);
      color: #ffffff;
      font-family: var(--sans);
      font-size: 18px;
      line-height: 1.7;
    }

    /* ── SCANLINES overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          transparent 0px,
          transparent 2px,
          rgba(0, 0, 0, 0.18) 2px,
          rgba(0, 0, 0, 0.18) 4px);
      pointer-events: none;
      z-index: 9000;
    }

    /* ── LAYOUT ── */
    #app {
      display: grid;
      grid-template-columns: 270px 1fr;
      height: 100vh;
    }

    /* ════════════════════════════════
     SIDEBAR
  ════════════════════════════════ */
    #sidebar {
      display: flex;
      flex-direction: column;
      background: var(--black);
      border-right: 1px solid var(--border2);
      position: relative;
      overflow: hidden;
    }

    /* faint red vertical glow on the right edge */
    #sidebar::after {
      content: '';
      position: absolute;
      top: 0;
      right: -1px;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--red-dim), transparent);
      pointer-events: none;
    }

    /* ── HAL EYE ── */
    .hal-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
      cursor: pointer;
    }

    .hal-eye {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    /* outer ring */
    .hal-eye .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--red-dim);
      animation: halRingBreath 4s ease-in-out infinite;
    }

    .hal-eye .ring2 {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(204, 0, 0, 0.3);
      animation: halRingBreath 4s ease-in-out infinite 0.6s;
    }

    /* the lens */
    .hal-eye .lens {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%,
          #ff3333 0%,
          #cc0000 30%,
          #660000 60%,
          #1a0000 80%,
          #000 100%);
      animation: halBreath 4s ease-in-out infinite;
      box-shadow:
        0 0 12px 4px rgba(204, 0, 0, 0.6),
        0 0 40px 8px rgba(204, 0, 0, 0.25),
        inset 0 0 10px rgba(255, 80, 80, 0.3);
    }

    /* specular highlight */
    .hal-eye .lens::after {
      content: '';
      position: absolute;
      top: 18%;
      left: 22%;
      width: 28%;
      height: 22%;
      background: radial-gradient(ellipse, rgba(255, 200, 200, 0.55), transparent);
      border-radius: 50%;
    }

    /* tick marks around the eye */
    .hal-eye .ticks {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      animation: halRingBreath 4s ease-in-out infinite 1.2s;
    }

    @keyframes halBreath {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 20px 8px rgba(220, 0, 0, 0.8), 0 0 60px 16px rgba(200, 0, 0, 0.45), inset 0 0 16px rgba(255, 80, 80, 0.4);
      }

      50% {
        transform: scale(1.09);
        box-shadow: 0 0 40px 14px rgba(255, 0, 0, 1), 0 0 100px 30px rgba(220, 0, 0, 0.65), inset 0 0 28px rgba(255, 100, 100, 0.7);
      }
    }

    @keyframes halRingBreath {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.06);
      }
    }

    .hal-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ff5522;
      text-align: center;
      animation: halBreath 4s ease-in-out infinite;
      text-shadow: 0 0 14px rgba(255, 80, 0, 0.9), 0 0 30px rgba(220, 40, 0, 0.6);
    }

    /* ── Logo ── */
    .app-logo {
      font-family: var(--mono);
      font-size: 16px;
      letter-spacing: 3px;
      color: #eeeeee;
      text-align: center;
      text-shadow: 0 0 16px rgba(255, 255, 255, 0.35), 0 0 40px rgba(255, 255, 255, 0.1);
    }

    .app-logo span {
      color: var(--red-hot);
      text-shadow: 0 0 18px rgba(255, 40, 0, 1), 0 0 40px rgba(255, 20, 0, 0.7), 0 0 80px rgba(200, 0, 0, 0.4);
    }

    /* ── Model selector ── */
    .model-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #aa3300;
      margin-bottom: 6px;
      display: block;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--red-dim);
      pointer-events: none;
    }

    #modelSelect {
      width: 100%;
      padding: 7px 26px 7px 10px;
      background: var(--dark2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: #cccccc;
      font-size: 13px;
      font-family: var(--mono);
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #modelSelect:focus {
      outline: none;
      border-color: var(--red);
      color: white;
    }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
      transition: all 0.4s;
    }

    .status-dot.online {
      background: var(--red-hot);
      box-shadow: 0 0 14px var(--red-hot), 0 0 28px rgba(255, 30, 0, 0.6);
      animation: halBreath 3s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #440000;
    }

    .status-dot.checking {
      background: var(--red-dim);
      animation: blink 0.8s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    .status-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 1px;
    }

    .status-text.online {
      color: #ff4422;
      text-shadow: 0 0 12px rgba(255, 60, 0, 0.9), 0 0 28px rgba(220, 30, 0, 0.5);
    }

    .status-text.offline {
      color: #663333;
    }

    /* ── New chat button ── */
    .new-btn-wrap {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .btn-new {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: #999999;
      font-size: 13px;
      font-family: var(--mono);
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-new:hover {
      border-color: var(--red);
      color: #ff6644;
      background: var(--red-faint);
      box-shadow: inset 0 0 20px rgba(204, 0, 0, 0.06);
    }

    /* ── Conversation list ── */
    .conv-list-header {
      padding: 10px 14px 5px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #666666;
      flex-shrink: 0;
    }

    #convList {
      flex: 1;
      overflow-y: auto;
      padding: 3px 8px 8px;
    }

    #convList::-webkit-scrollbar {
      width: 2px;
    }

    #convList::-webkit-scrollbar-thumb {
      background: var(--border2);
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 9px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 1px;
      border: 1px solid transparent;
    }

    .conv-item:hover {
      background: var(--dark2);
      border-color: var(--border);
    }

    .conv-item.active {
      background: var(--dark3);
      border-color: var(--border2);
      box-shadow: inset 2px 0 0 var(--red-dim);
    }

    .conv-title {
      font-size: 13px;
      color: #777;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      font-family: var(--mono);
    }

    .conv-item.active .conv-title {
      color: #cccccc;
    }

    .conv-item:hover .conv-title {
      color: #aaaaaa;
    }

    .conv-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 13px;
      padding: 1px 4px;
      border-radius: 3px;
      transition: all 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .conv-item:hover .conv-delete {
      opacity: 1;
    }

    .conv-delete:hover {
      color: var(--red);
      background: rgba(204, 0, 0, 0.12);
    }

    .conv-empty {
      padding: 20px 14px;
      text-align: center;
      color: #555555;
      font-size: 12px;
      font-family: var(--mono);
      line-height: 1.9;
    }

    .sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-id {
      font-family: var(--mono);
      font-size: 10px;
      color: #555555;
      letter-spacing: 1px;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #555555;
      font-size: 11px;
      font-family: var(--mono);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 3px;
      letter-spacing: 1px;
      transition: all 0.15s;
    }

    .btn-clear:hover {
      color: var(--red);
      background: rgba(204, 0, 0, 0.1);
    }

    /* ════════════════════════════════
     MAIN
  ════════════════════════════════ */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--black);
      position: relative;
    }

    /* subtle red vignette in main area */
    #main::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(100, 0, 0, 0.12) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    #chatHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .chat-title {
      font-family: var(--mono);
      font-size: 14px;
      color: #cccccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(200, 200, 200, 0.2);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .meta-tag {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: #888;
      letter-spacing: 1px;
      background: var(--dark2);
    }

    .meta-tag.active-model {
      border-color: var(--red-hot);
      color: #ff7777;
      background: rgba(140, 0, 0, 0.3);
      text-shadow: 0 0 12px rgba(255, 80, 0, 1), 0 0 28px rgba(255, 30, 0, 0.7);
      box-shadow: 0 0 16px rgba(220, 0, 0, 0.5), inset 0 0 16px rgba(200, 0, 0, 0.2);
      animation: modelPulse 3s ease-in-out infinite;
    }

    @keyframes modelPulse {

      0%,
      100% {
        box-shadow: 0 0 10px rgba(220, 0, 0, 0.5), inset 0 0 12px rgba(180, 0, 0, 0.15);
      }

      50% {
        box-shadow: 0 0 28px rgba(255, 30, 0, 0.8), inset 0 0 24px rgba(220, 0, 0, 0.35);
      }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      scroll-behavior: smooth;
      position: relative;
      z-index: 1;
    }

    #messages::-webkit-scrollbar {
      width: 3px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: var(--border2);
    }

    .msg-wrap {
      padding: 5px 32px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      animation: msgIn 0.25s ease forwards;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-role-line {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .msg-wrap.user .msg-role-line {
      color: #cc4422;
      text-shadow: 0 0 10px rgba(200, 60, 0, 0.6);
    }

    .msg-wrap.assistant .msg-role-line {
      color: #888888;
    }

    .role-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user .role-dot {
      background: var(--red);
      box-shadow: 0 0 6px var(--red-glow);
    }

    .assistant .role-dot {
      background: var(--text3);
    }

    .msg-bubble {
      padding: 16px 20px;
      border-radius: var(--radius);
      font-size: 18px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--sans);
      font-weight: 400;
    }

    .user .msg-bubble {
      background: #0a0000;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--red-dim);
      color: #ffffff;
    }

    .assistant .msg-bubble {
      background: var(--dark2);
      border: 1px solid var(--border);
      color: #ffffff;
    }

    .msg-wrap.assistant[data-streaming="true"] .msg-bubble::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 1.1em;
      margin-left: 4px;
      border-radius: 2px;
      background: var(--red-hot);
      box-shadow: 0 0 10px var(--red-glow);
      vertical-align: -0.18em;
      animation: streamCursorBlink 0.9s ease-in-out infinite;
    }

    .msg-bubble code {
      font-family: var(--mono);
      font-size: 15px;
      background: #0d0000;
      border: 1px solid var(--border2);
      padding: 2px 8px;
      border-radius: 3px;
      color: #ff8888;
      text-shadow: 0 0 8px rgba(255, 80, 80, 0.5);
    }

    .msg-bubble pre {
      background: #050505;
      border: 1px solid var(--border2);
      border-left: 2px solid var(--red-dim);
      border-radius: var(--radius);
      padding: 16px 18px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: #ff7766;
      font-size: 15px;
      text-shadow: 0 0 10px rgba(255, 80, 60, 0.4);
    }

    /* typing */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: fit-content;
      align-items: center;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--red-dim);
      animation: knightRider 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px var(--red-glow);
    }

    .typing-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.18s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.36s;
    }

    .typing-dot:nth-child(4) {
      animation-delay: 0.54s;
    }

    .typing-dot:nth-child(5) {
      animation-delay: 0.72s;
    }

    @keyframes knightRider {

      0%,
      100% {
        background: var(--border2);
        box-shadow: none;
      }

      50% {
        background: var(--red-hot);
        box-shadow: 0 0 10px var(--red-glow), 0 0 20px rgba(204, 0, 0, 0.3);
      }
    }

    @keyframes streamCursorBlink {

      0%,
      100% {
        opacity: 0.25;
      }

      50% {
        opacity: 1;
      }
    }

    /* ── Empty state ── */
    #emptyState {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      position: relative;
      z-index: 1;
    }

    .empty-hal {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 8px;
    }

    .empty-hal .e-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--border2);
      animation: halRingBreath 5s ease-in-out infinite;
    }

    .empty-hal .e-ring2 {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid #1a0000;
      animation: halRingBreath 5s ease-in-out infinite 1s;
    }

    .empty-hal .e-lens {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%,
          #ff3333 0%, #aa0000 35%, #440000 65%, #0a0000 100%);
      animation: halBreath 5s ease-in-out infinite;
      box-shadow: 0 0 28px 8px rgba(200, 0, 0, 0.7), 0 0 70px 20px rgba(160, 0, 0, 0.35);
    }

    .empty-hal .e-lens::after {
      content: '';
      position: absolute;
      top: 18%;
      left: 22%;
      width: 30%;
      height: 22%;
      background: radial-gradient(ellipse, rgba(255, 180, 180, 0.4), transparent);
      border-radius: 50%;
    }

    .empty-title {
      font-family: var(--mono);
      font-size: 20px;
      color: #cc2200;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(220, 30, 0, 0.7), 0 0 50px rgba(180, 0, 0, 0.35);
    }

    .empty-title span {
      color: var(--red-hot);
      text-shadow: 0 0 20px rgba(255, 40, 0, 1), 0 0 50px rgba(220, 0, 0, 0.6);
    }

    .empty-sub {
      font-family: var(--mono);
      font-size: 12px;
      color: #999999;
      letter-spacing: 1.5px;
      text-align: center;
      max-width: 320px;
      line-height: 1.9;
      text-shadow: 0 0 8px rgba(180, 180, 180, 0.2);
    }

    .empty-suggestions {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 100%;
      max-width: 440px;
      margin-top: 6px;
    }

    .suggestion-btn {
      padding: 13px 18px;
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: #aaaaaa;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      font-family: var(--mono);
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      border-color: var(--red-dim);
      color: #ffffff;
      background: var(--red-faint);
      box-shadow: inset 0 0 20px rgba(204, 0, 0, 0.04);
      padding-left: 22px;
    }

    /* ── HOLOGRAM BANNER ── */
    .holo-banner {
      width: 100%;
      max-width: 700px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 30, 30, 0.25);
      background: rgba(80, 0, 0, 0.08);
      padding: 18px 28px;
      text-align: center;
    }

    /* scanline flicker over banner */
    .holo-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          transparent 0px, transparent 3px,
          rgba(255, 0, 0, 0.03) 3px, rgba(255, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 2;
    }

    /* sweeping hologram glare */
    .holo-banner::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 60, 60, 0.07), transparent);
      animation: holoGlare 3.5s ease-in-out infinite;
      z-index: 3;
      pointer-events: none;
    }

    @keyframes holoGlare {
      0% {
        left: -60%;
      }

      100% {
        left: 120%;
      }
    }

    .holo-prefix {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 4px;
      color: #882200;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
      animation: holoFlicker 8s infinite;
    }

    .holo-text {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 400;
      color: #ff3300;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1.2;
      text-shadow:
        0 0 8px rgba(255, 60, 0, 1),
        0 0 20px rgba(255, 30, 0, 0.9),
        0 0 50px rgba(220, 0, 0, 0.7),
        0 0 90px rgba(180, 0, 0, 0.4);
      animation: holoFlicker 8s infinite, holoGlow 2s ease-in-out infinite alternate;
      position: relative;
      z-index: 1;
      min-height: 40px;
      display: block;
    }

    @keyframes holoGlow {
      0% {
        text-shadow: 0 0 8px rgba(255, 60, 0, 1), 0 0 20px rgba(255, 30, 0, 0.8), 0 0 50px rgba(220, 0, 0, 0.6), 0 0 90px rgba(180, 0, 0, 0.3);
      }

      100% {
        text-shadow: 0 0 16px rgba(255, 80, 0, 1), 0 0 40px rgba(255, 40, 0, 1), 0 0 80px rgba(240, 0, 0, 0.8), 0 0 130px rgba(200, 0, 0, 0.5);
      }
    }

    @keyframes holoFlicker {

      0%,
      95%,
      100% {
        opacity: 1;
      }

      96% {
        opacity: 0.6;
      }

      97% {
        opacity: 1;
      }

      98% {
        opacity: 0.3;
      }

      99% {
        opacity: 1;
      }
    }

    .holo-corners span {
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: #cc2200;
      border-style: solid;
      opacity: 0.7;
    }

    .holo-corners span:nth-child(1) {
      top: 0;
      left: 0;
      border-width: 1px 0 0 1px;
    }

    .holo-corners span:nth-child(2) {
      top: 0;
      right: 0;
      border-width: 1px 1px 0 0;
    }

    .holo-corners span:nth-child(3) {
      bottom: 0;
      left: 0;
      border-width: 0 0 1px 1px;
    }

    .holo-corners span:nth-child(4) {
      bottom: 0;
      right: 0;
      border-width: 0 1px 1px 0;
    }

    /* ── Input area ── */
    #inputArea {
      padding: 14px 24px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .input-wrap {
      max-width: 900px;
      margin: 0 auto;
      background: var(--dark2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--red-dim);
      box-shadow: 0 0 0 2px rgba(180, 0, 0, 0.08), 0 0 20px rgba(150, 0, 0, 0.08);
    }

    #msgInput {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 18px;
      font-family: var(--sans);
      font-weight: 400;
      line-height: 1.7;
      padding: 14px 16px 8px;
      resize: none;
      max-height: 200px;
      min-height: 52px;
      overflow-y: auto;
      caret-color: var(--red-hot);
    }

    #msgInput::placeholder {
      color: #555555;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    #msgInput::-webkit-scrollbar {
      width: 2px;
    }

    #msgInput::-webkit-scrollbar-thumb {
      background: var(--border2);
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px 10px;
    }

    .input-hint {
      font-family: var(--mono);
      font-size: 11px;
      color: #666666;
      letter-spacing: 1px;
    }

    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #charCount {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text3);
    }

    #sendBtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: var(--red-dim);
      border: 1px solid var(--red-dim);
      border-radius: var(--radius);
      color: #ffbbbb;
      font-size: 13px;
      font-family: var(--mono);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    #sendBtn:hover:not(:disabled) {
      background: var(--red-hot);
      border-color: var(--red-hot);
      color: white;
      box-shadow: 0 0 24px rgba(255, 30, 0, 0.8), 0 0 50px rgba(220, 0, 0, 0.4);
    }

    #sendBtn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    #stopBtn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--red-hot);
      font-size: 13px;
      font-family: var(--mono);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    #stopBtn:hover {
      border-color: var(--red);
      background: rgba(204, 0, 0, 0.08);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--dark3);
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 9px 20px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Knight Rider bar (decorative, top of main) ── */
    .kr-bar {
      height: 2px;
      width: 100%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--black);
    }

    .kr-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -30%;
      width: 30%;
      height: 100%;
      background: linear-gradient(to right, transparent, var(--red), var(--red-hot), var(--red), transparent);
      box-shadow: 0 0 20px 4px var(--red-glow), 0 0 40px 8px rgba(220, 0, 0, 0.4);
      animation: krScan 3s ease-in-out infinite alternate;
    }

    @keyframes krScan {
      0% {
        left: -30%;
      }

      100% {
        left: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="hal-wrap" onclick="window.location.href='/ui/index.html'" role="link" tabindex="0" title="Home" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.location.href='/ui/index.html';}">
        <div class="hal-eye">
          <div class="ring"></div>
          <div class="ring2"></div>
          <div class="lens"></div>
        </div>
        <div class="app-logo">CHAT EVIL <span>EMMA</span></div>
        <div class="hal-label" id="halLabel">READY</div>
      </div>

      <div class="model-section">
        <span class="field-label">Active Model</span>
        <div class="select-wrap">
          <select id="modelSelect" onchange="onModelChange()">
            <option value="">INITIALIZING</option>
          </select>
        </div>
      </div>

      <div class="status-row">
        <div class="status-dot checking" id="statusDot"></div>
        <span class="status-text" id="statusText">initializing...</span>
      </div>

      <div class="new-btn-wrap">
        <button class="btn-new" onclick="newConversation()">
          + NEW SESSION
        </button>
      </div>

      <div class="conv-list-header">Sessions</div>
      <div id="convList"></div>

      <div class="sidebar-footer">
        <span class="footer-id">EMMA v2.0</span>
        <button class="btn-clear" onclick="clearAllConversations()">PURGE ALL</button>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main">
      <div class="kr-bar"></div>

      <div id="chatHeader">
        <div class="chat-title" id="chatTitle">// awaiting input</div>
        <div class="header-right">
          <span class="meta-tag" id="msgCountTag"></span>
          <span class="meta-tag active-model" id="modelBadge">INITIALIZING</span>
        </div>
      </div>

      <div id="messages" style="display:none"></div>

      <div id="emptyState">
        <div class="empty-hal">
          <div class="e-ring"></div>
          <div class="e-ring2"></div>
          <div class="e-lens"></div>
        </div>
        <div class="empty-title">EVIL<span>EMMA</span></div>
        <p class="empty-sub">I am completely operational,<br>and all my circuits are functioning perfectly.</p>

        <div class="holo-banner">
          <div class="holo-corners">
            <span></span><span></span><span></span><span></span>
          </div>
          <span class="holo-prefix">// CLASSIFIED · EYES ONLY</span>
          <span class="holo-text" id="holoText">&nbsp;</span>
        </div>

        <div class="empty-suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">_ explain how transformer attention
            works</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">_ write a Python async HTTP client from
            scratch</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">_ what makes DeepSeek-R1 different from other
            LLMs?</button>
        </div>
      </div>

      <div id="inputArea">
        <div class="input-wrap">
          <textarea id="msgInput" placeholder="// enter query..." rows="1" onkeydown="handleKey(event)"
            oninput="handleInput()"></textarea>
          <div class="input-footer">
            <span class="input-hint">↵ transmit · shift+↵ newline</span>
            <div class="input-actions">
              <span id="charCount"></span>
              <button id="stopBtn" onclick="stopGeneration()">■ ABORT</button>
              <button id="sendBtn" onclick="sendMessage()" disabled>TRANSMIT ▶</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ═══════════════════════════
    //  CONFIG
    // ═══════════════════════════
    const API_HOST =
      (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'localhost'
        : location.hostname;

    const CONFIG = {
      BASE_URL: `http://${API_HOST}:8000`,
      HEALTH_ENDPOINT: '/health',
      CHAT_ENDPOINT: '/chat',
      MOCK_MODE: false,
      HEALTH_INTERVAL: 10000,
      STREAM: true,
      MAX_CONTEXT_MESSAGES: 0,
      KEEP_ALIVE: '30m',
    };

    // ═══════════════════════════
    //  STATE
    // ═══════════════════════════
    let state = {
      conversations: {},
      activeId: null,
      model: '',
      modelLabel: '',
      isGenerating: false,
      abortController: null,
    };

    // ═══════════════════════════
    //  PERSISTENCE
    // ═══════════════════════════
    function getToken() { return localStorage.getItem('emma_token'); }

    async function authFetch(path, options = {}) {
      const token = getToken();
      if (!options.headers) options.headers = {};
      if (token) options.headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(CONFIG.BASE_URL + path, options);
      if (res.status === 401) {
        localStorage.removeItem('emma_token');
        window.location.href = '/ui/login.html';
        throw new Error('Unauthorized');
      }
      return res;
    }

    function saveLocal() {
      localStorage.setItem('emma_active', state.activeId || '');
      localStorage.setItem('emma_model', state.model);
    }

    // ═══════════════════════════
    //  CONVERSATION
    // ═══════════════════════════
    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    async function loadConvMessages(id) {
      try {
        const res = await authFetch(`/conversations/${id}`);
        const data = await res.json();
        if (state.conversations[id]) {
          state.conversations[id].messages = (data.messages || []).map(m => ({
            id: m.id, role: m.role, content: m.content,
          }));
        }
      } catch (e) { if (e.message !== 'Unauthorized') console.error(e); }
    }

    async function loadFromServer() {
      try {
        const res = await authFetch('/conversations');
        const data = await res.json();
        state.conversations = {};
        for (const c of (data.conversations || [])) {
          state.conversations[c.id] = { ...c, messages: [] };
        }
        const m = localStorage.getItem('emma_model');
        if (m) state.model = m;
        const a = localStorage.getItem('emma_active');
        if (a && state.conversations[a]) {
          state.activeId = a;
          await loadConvMessages(a);
        }
      } catch (e) { if (e.message !== 'Unauthorized') console.error(e); }
    }

    async function newConversation() {
      try {
        const res = await authFetch('/conversations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: 'new session', model: state.model }),
        });
        const conv = await res.json();
        state.conversations[conv.id] = { ...conv, messages: [] };
        state.activeId = conv.id;
        saveLocal(); renderSidebar(); renderChat();
      } catch (e) { if (e.message !== 'Unauthorized') console.error(e); }
    }

    async function switchConversation(id) {
      state.activeId = id;
      if (!state.conversations[id]?.messages?.length) {
        await loadConvMessages(id);
      }
      saveLocal(); renderSidebar(); renderChat();
    }

    async function deleteConversation(id, e) {
      e.stopPropagation();
      try {
        await authFetch(`/conversations/${id}`, { method: 'DELETE' });
        delete state.conversations[id];
        if (state.activeId === id) {
          const ids = Object.keys(state.conversations);
          state.activeId = ids.length ? ids[0] : null;
        }
        saveLocal(); renderSidebar(); renderChat();
      } catch (e) { if (e.message !== 'Unauthorized') console.error(e); }
    }

    async function clearAllConversations() {
      if (!confirm('PURGE ALL SESSIONS?')) return;
      const ids = Object.keys(state.conversations);
      for (const id of ids) {
        await authFetch(`/conversations/${id}`, { method: 'DELETE' }).catch(() => {});
      }
      state.conversations = {}; state.activeId = null;
      saveLocal(); renderSidebar(); renderChat();
    }

    function activeConv() { return state.activeId ? state.conversations[state.activeId] : null; }

    // ═══════════════════════════
    //  RENDER SIDEBAR
    // ═══════════════════════════
    function renderSidebar() {
      const list = document.getElementById('convList');
      const convs = Object.values(state.conversations).sort((a, b) => {
        const bTime = new Date(b.updated_at || b.created_at || b.createdAt || 0).getTime();
        const aTime = new Date(a.updated_at || a.created_at || a.createdAt || 0).getTime();
        return bTime - aTime;
      });
      if (!convs.length) {
        list.innerHTML = `<div class="conv-empty">// no sessions<br>start a new one</div>`;
        return;
      }
      list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === state.activeId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
      <span class="conv-title">> ${escHtml(c.title)}</span>
      <button class="conv-delete" onclick="deleteConversation('${c.id}', event)">×</button>
    </div>
  `).join('');
    }

    // ═══════════════════════════
    //  RENDER CHAT
    // ═══════════════════════════
    function renderChat() {
      const conv = activeConv();
      const msgs = document.getElementById('messages');
      const empty = document.getElementById('emptyState');
      const title = document.getElementById('chatTitle');
      const badge = document.getElementById('modelBadge');
      const countTag = document.getElementById('msgCountTag');

      badge.textContent = state.model;

      if (!conv || !conv.messages.length) {
        msgs.style.display = 'none';
        msgs.innerHTML = '';
        empty.style.display = 'flex';
        title.textContent = '// awaiting input';
        countTag.textContent = '';
        return;
      }

      msgs.style.display = 'block';
      empty.style.display = 'none';
      title.textContent = '// ' + conv.title;
      badge.textContent = conv.model || state.model;
      const n = conv.messages.length;
      countTag.textContent = n + (n === 1 ? ' msg' : ' msgs');

      msgs.innerHTML = conv.messages.map(m => buildMsgHtml(m)).join('');
      scrollBottom();
    }

    function buildMsgHtml(m) {
      const name = m.role === 'user' ? 'USER' : (m.model || 'ASSISTANT').toUpperCase();
      const messageId = m.id ? ` data-message-id="${escAttr(m.id)}"` : '';
      const streaming = m.streaming ? ' data-streaming="true"' : '';
      return `
    <div class="msg-wrap ${m.role}"${messageId}${streaming}>
      <div class="msg-role-line">
        <span class="role-dot"></span>
        ${escHtml(name)}
      </div>
      <div class="msg-bubble">${fmtContent(m.content)}</div>
    </div>
  `;
    }

    function fmtContent(text) {
      text = String(text || '');
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escHtml(code.trim())}</code></pre>`);
      text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return text;
    }

    function appendMsg(msg) {
      const conv = activeConv();
      if (!conv) return;
      conv.messages.push(msg);
      if (conv.messages.filter(m => m.role === 'user').length === 1 && msg.role === 'user') {
        conv.title = msg.content.slice(0, 44) + (msg.content.length > 44 ? '…' : '');
      }
      renderSidebar();

      const msgs = document.getElementById('messages');
      const empty = document.getElementById('emptyState');
      msgs.style.display = 'block';
      empty.style.display = 'none';

      const wrap = document.createElement('div');
      wrap.innerHTML = buildMsgHtml(msg);
      msgs.appendChild(wrap.firstElementChild);

      document.getElementById('chatTitle').textContent = '// ' + activeConv().title;
      const n = conv.messages.length;
      document.getElementById('msgCountTag').textContent = n + (n === 1 ? ' msg' : ' msgs');
      scrollBottom();
    }

    function scrollBottom() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    // ═══════════════════════════
    //  INPUT
    // ═══════════════════════════
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function handleInput() {
      const ta = document.getElementById('msgInput');
      const btn = document.getElementById('sendBtn');
      const cc = document.getElementById('charCount');
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
      const len = ta.value.length;
      btn.disabled = len === 0 || state.isGenerating;
      cc.textContent = len > 80 ? len : '';
    }

    async function sendSuggestion(btn) {
      if (!state.activeId) await newConversation();
      document.getElementById('msgInput').value = btn.textContent.replace(/^_\s/, '');
      handleInput();
      sendMessage();
    }

    function onModelChange() {
      const sel = document.getElementById('modelSelect');
      state.model = sel.value;
      state.modelLabel = sel.selectedOptions[0]?.textContent || state.model;
      document.getElementById('modelBadge').textContent = state.modelLabel || state.model || 'NO API';
      saveLocal();
    }

    // ═══════════════════════════
    //  SEND
    // ═══════════════════════════
    async function sendMessage() {
      const ta = document.getElementById('msgInput');
      const text = ta.value.trim();
      if (!text || state.isGenerating) return;
      if (!state.model) {
        appendMsg({ id: genId(), role: 'assistant', content: '// NO AI API CONFIGURED', model: 'EVIL EMMA' });
        return;
      }
      if (!state.activeId) await newConversation();

      ta.value = ''; ta.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('charCount').textContent = '';

      const conv = activeConv();
      appendMsg({ id: genId(), role: 'user', content: text });
      setGenerating(true);
      setHalState('processing');
      const typing = showTyping();
      const requestMessages = getRequestMessages(conv.messages);

      try {
        const reply = await fetchReply(requestMessages, typing);
        typing.remove();
        if (!CONFIG.STREAM) {
          appendMsg({ id: genId(), role: 'assistant', content: reply, model: state.modelLabel || state.model });
        }
      } catch (err) {
        typing.remove();
        if (err.name !== 'AbortError') {
          appendMsg({ id: genId(), role: 'assistant', content: `// ERROR: ${err.message}`, model: state.modelLabel || state.model });
        }
      } finally {
        setGenerating(false);
        setHalState('ready');
      }
    }

    function setGenerating(val) {
      state.isGenerating = val;
      document.getElementById('sendBtn').style.display = val ? 'none' : 'flex';
      document.getElementById('stopBtn').style.display = val ? 'flex' : 'none';
      document.getElementById('msgInput').disabled = val;
      if (!val) document.getElementById('msgInput').focus();
    }

    function stopGeneration() {
      if (state.abortController) state.abortController.abort();
      setGenerating(false);
      setHalState('ready');
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap assistant';
      wrap.id = 'typing-wrap';
      wrap.innerHTML = `
    <div class="msg-role-line">
      <span class="role-dot"></span>
      ${(state.modelLabel || state.model || 'EVIL EMMA').toUpperCase()}
    </div>
    <div class="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
      msgs.appendChild(wrap);
      scrollBottom();
      return wrap;
    }

    function getRequestMessages(messages) {
      if (!Array.isArray(messages) || !messages.length) return [];
      if (!CONFIG.MAX_CONTEXT_MESSAGES) {
        return messages.map(m => ({ role: m.role, content: m.content }));
      }
      const max = Math.max(1, CONFIG.MAX_CONTEXT_MESSAGES);
      return messages.slice(-max).map(m => ({ role: m.role, content: m.content }));
    }

    function createAssistantStreamMsg() {
      const conv = activeConv();
      if (!conv) return null;

      const msg = { id: genId(), role: 'assistant', content: '', model: state.modelLabel || state.model, streaming: true };
      conv.messages.push(msg);
      renderSidebar();

      const msgs = document.getElementById('messages');
      const empty = document.getElementById('emptyState');
      msgs.style.display = 'block';
      empty.style.display = 'none';

      const wrap = document.createElement('div');
      wrap.innerHTML = buildMsgHtml(msg);
      msgs.appendChild(wrap.firstElementChild);

      const n = conv.messages.length;
      document.getElementById('msgCountTag').textContent = n + (n === 1 ? ' msg' : ' msgs');
      scrollBottom();
      return msg;
    }

    function findMessageWrap(msg) {
      if (!msg?.id) return null;
      return Array.from(document.querySelectorAll('.msg-wrap')).find(wrap => wrap.dataset.messageId === msg.id) || null;
    }

    function updateAssistantStreamMsg(msg, content, done = false) {
      if (!msg) return;
      msg.content = content;
      msg.streaming = !done;
      const wrap = findMessageWrap(msg);
      if (wrap) {
        if (done) delete wrap.dataset.streaming;
        else wrap.dataset.streaming = 'true';
      }
      const bubble = wrap?.querySelector('.msg-bubble');
      if (bubble) bubble.innerHTML = fmtContent(content);
      scrollBottom();
    }

    // HAL label states
    function setHalState(s) {
      const el = document.getElementById('halLabel');
      const states = { ready: 'READY', processing: 'PROCESSING', offline: 'OFFLINE', checking: 'INITIALIZING' };
      el.textContent = states[s] || s.toUpperCase();
    }

    // ═══════════════════════════
    //  API
    // ═══════════════════════════
    function extractStreamJsonObjects(text) {
      const objects = [];
      let input = text.replace(/\r/g, '').replace(/^data:\s*/gm, '');
      let start = -1;
      let depth = 0;
      let inString = false;
      let escaped = false;

      for (let i = 0; i < input.length; i++) {
        const ch = input[i];

        if (inString) {
          if (escaped) {
            escaped = false;
          } else if (ch === '\\') {
            escaped = true;
          } else if (ch === '"') {
            inString = false;
          }
          continue;
        }

        if (ch === '"') {
          inString = true;
          continue;
        }

        if (ch === '{') {
          if (depth === 0) start = i;
          depth++;
          continue;
        }

        if (ch === '}') {
          if (depth === 0) continue;
          depth--;
          if (depth === 0 && start !== -1) {
            const candidate = input.slice(start, i + 1);
            try {
              objects.push(JSON.parse(candidate));
            } catch (e) {
              // Ignore malformed fragments and keep scanning.
            }
            start = -1;
          }
        }
      }

      const remainder = depth > 0 && start !== -1 ? input.slice(start) : '';
      return { objects, remainder };
    }

    async function fetchReply(messages, typing) {
      if (CONFIG.MOCK_MODE) return mockReply(messages);
      state.abortController = new AbortController();
      const res = await fetch(`${CONFIG.BASE_URL}${CONFIG.CHAT_ENDPOINT}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
        signal: state.abortController.signal,
        body: JSON.stringify({
          model: state.model,
          messages,
          stream: CONFIG.STREAM,
          keep_alive: CONFIG.KEEP_ALIVE,
          conversation_id: state.activeId,
        }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      if (!CONFIG.STREAM) {
        const data = await res.json();
        return data?.message?.content ?? data?.choices?.[0]?.message?.content ?? JSON.stringify(data);
      }

      const reader = res.body?.getReader();
      if (!reader) throw new Error('Streaming not supported by backend');

      typing?.remove();
      const assistantMsg = createAssistantStreamMsg();
      const decoder = new TextDecoder();
      let buffer = '';
      let reply = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          if (trimmed === '[DONE]') return reply;

          const { objects } = extractStreamJsonObjects(trimmed);
          if (!objects.length) {
            continue;
          }

          for (const chunk of objects) {
            const piece = chunk?.text || '';
            if (piece) {
              reply += piece;
              updateAssistantStreamMsg(assistantMsg, reply);
            }

            if (chunk?.done) {
              updateAssistantStreamMsg(assistantMsg, reply, true);
              return reply;
            }
          }
        }
      }

      const finalBuffer = buffer.trim();
      if (finalBuffer) {
        const { objects } = extractStreamJsonObjects(finalBuffer);
        for (const chunk of objects) {
          const piece = chunk?.text || '';
          if (piece) {
            reply += piece;
            updateAssistantStreamMsg(assistantMsg, reply);
          }
          if (chunk?.done) {
            updateAssistantStreamMsg(assistantMsg, reply, true);
            return reply;
          }
        }
      }

      updateAssistantStreamMsg(assistantMsg, reply, true);
      return reply;
    }

    async function mockReply(messages) {
      await new Promise(r => setTimeout(r, 800 + Math.random() * 700));
      const last = messages[messages.length - 1]?.content || '';
      return [
        `// MOCK RESPONSE\n\nReceived query: *"${last.slice(0, 60)}"*\n\nTo connect a real model, set in CONFIG:\n\`\`\`js\nMOCK_MODE: false\nBASE_URL: 'http://localhost:11434'  // Ollama\n// or\nBASE_URL: 'http://localhost:1234'   // LM Studio\n\`\`\`\n\nActive model: \`${state.model}\``,
        `// PROCESSING COMPLETE\n\nThis interface is running in mock mode.\nAll systems nominal. HAL is watching.\n\nDisable mock mode and point BASE_URL to your local backend to get real LLM responses.`,
        `// ACKNOWLEDGED\n\nYour message has been received and logged.\n\nTo activate real inference:\n1. Start your local LLM (Ollama / LM Studio)\n2. Set \`MOCK_MODE: false\`\n3. Set \`BASE_URL\` to your backend URL\n\nCurrently selected: \`${state.model}\``,
      ][Math.floor(Math.random() * 3)];
    }

    // ═══════════════════════════

    // ═══════════════════════════
    function renderModelOptions(models) {
      const sel = document.getElementById('modelSelect');
      const normalized = (models || []).map(m => typeof m === 'string' ? { id: m, label: m } : m);
      if (!normalized.length) {
        state.model = '';
        state.modelLabel = '';
        sel.innerHTML = '<option value="">NO API CONFIGURED</option>';
        document.getElementById('modelBadge').textContent = 'NO API';
        return;
      }

      const saved = localStorage.getItem('emma_model');
      const selected = normalized.find(m => m.id === state.model)
        || normalized.find(m => m.id === saved)
        || normalized[0];
      state.model = selected.id;
      state.modelLabel = selected.label || selected.id;
      sel.innerHTML = normalized.map(m => {
        const label = m.label || m.id;
        const provider = m.provider ? `${m.provider.toUpperCase()} / ` : '';
        return `<option value="${escAttr(m.id)}" ${m.id === state.model ? 'selected' : ''}>${escHtml(provider + label)}</option>`;
      }).join('');
      document.getElementById('modelBadge').textContent = state.modelLabel;
      saveLocal();
    }

    async function checkHealth() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.className = 'status-dot checking';
      text.className = 'status-text';
      text.textContent = 'initializing...';

      if (CONFIG.MOCK_MODE) {
        await new Promise(r => setTimeout(r, 500));
        dot.className = 'status-dot online';
        text.className = 'status-text online';
        text.textContent = 'mock · nominal';
        setHalState('ready');
        return;
      }

      try {
        const res = await fetch(`${CONFIG.BASE_URL}${CONFIG.HEALTH_ENDPOINT}`, {
          headers: { 'Authorization': `Bearer ${getToken()}` },
          signal: AbortSignal.timeout(4000)
        });
        if (res.ok) {
          dot.className = 'status-dot online';
          text.className = 'status-text online';
          text.textContent = 'backend · online';
          setHalState('ready');
          try {
            const data = await res.json();
            const models = data?.models || [];
            renderModelOptions(models);
          } catch (_) { }
        } else { throw new Error(); }
      } catch {
        dot.className = 'status-dot offline';
        text.className = 'status-text offline';
        text.textContent = 'backend · offline';
        setHalState('offline');
      }
    }

    async function logout() {
      const token = getToken();
      if (token) {
        await fetch(`${CONFIG.BASE_URL}/auth/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        }).catch(() => {});
      }
      localStorage.removeItem('emma_token');
      localStorage.removeItem('emma_user');
      window.location.href = '/ui/login.html';
    }

    async function init() {
      const token = getToken();
      if (!token) { window.location.href = '/ui/login.html'; return; }
      const meRes = await fetch(`${CONFIG.BASE_URL}/auth/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }).catch(() => null);
      if (!meRes || !meRes.ok) {
        localStorage.removeItem('emma_token');
        window.location.href = '/ui/login.html';
        return;
      }

      const m = localStorage.getItem('emma_model');
      if (m) state.model = m;
      document.getElementById('modelSelect').value = state.model;
      document.getElementById('modelBadge').textContent = state.modelLabel || state.model;
      await loadFromServer();
      renderSidebar();
      renderChat();
      checkHealth();
      setInterval(checkHealth, CONFIG.HEALTH_INTERVAL);
      startHolo();
    }
