<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/emma-favicon.svg">
  <title>Emma · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --blue: #0071e3;
      --blue-light: #e8f1fb;
      --text: #1d1d1f;
      --text2: #424245;
      --text3: #86868b;
      --red: #ff3b30;
      --shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Inter', sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    /* HAL eye */
    .hal {
      position: relative;
      width: 52px;
      height: 52px;
    }
    .hal .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(0,113,227,0.15);
      animation: ring 4s ease-in-out infinite;
    }
    .hal .ring2 {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0,113,227,0.08);
      animation: ring 4s ease-in-out infinite 0.8s;
    }
    .hal .lens {
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #5eaeff 0%, #0071e3 35%, #0051a8 70%, #003070 100%);
      animation: breath 4s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(0,113,227,0.35), 0 0 28px rgba(0,113,227,0.15);
    }
    .hal .lens::after {
      content: '';
      position: absolute;
      top: 15%; left: 18%;
      width: 30%; height: 22%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.55), transparent);
      border-radius: 50%;
    }
    @keyframes breath {
      0%, 100% { box-shadow: 0 0 10px rgba(0,113,227,0.3), 0 0 24px rgba(0,113,227,0.12); transform: scale(1); }
      50% { box-shadow: 0 0 20px rgba(0,113,227,0.55), 0 0 48px rgba(0,113,227,0.22); transform: scale(1.07); }
    }
    @keyframes ring {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }

    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .logo h1 span { color: var(--blue); }
    .logo p { font-size: 13px; color: var(--text3); }

    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.2px;
    }
    input {
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
    }

    button[type="submit"] {
      height: 40px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      font-size: 13px;
      color: var(--red);
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" onclick="window.location.href='/ui/index.html'" role="link" tabindex="0" title="Home" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.location.href='/ui/index.html';}">
      <div class="hal">
        <div class="ring"></div>
        <div class="ring2"></div>
        <div class="lens"></div>
      </div>
      <h1>Chat <span>Emma</span></h1>
      <p>Private AI — running local</p>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <p class="error" id="errorMsg"></p>
      <button type="submit" id="loginBtn">Sign in</button>
    </form>
  </div>

  <script>
    const BASE_URL = 'http://localhost:8650';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.textContent = '';

      try {
        const res = await fetch(`${BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Invalid username or password');
        }
        const data = await res.json();
        localStorage.setItem('emma_token', data.token);
        localStorage.setItem('emma_user', JSON.stringify(data.user));
        window.location.href = '/ui/index.html';
      } catch (err2) {
        err.textContent = err2.message;
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
